name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: socialflow
          POSTGRES_PASSWORD: socialflow
          POSTGRES_DB: socialflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U socialflow -d socialflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Build without real secrets — see lib/env.ts.
      SKIP_ENV_VALIDATION: "true"
      DATABASE_URL: "postgresql://socialflow:socialflow@localhost:5432/socialflow_test"
      DB_DRIVER: "node-postgres"
      REDIS_URL: "redis://localhost:6379"
      # Valid-format placeholder (points to a non-existent instance) so ClerkProvider builds.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2xlcmsuZXhhbXBsZS5jb20k"
      CLERK_SECRET_KEY: "sk_test_dummy0000000000000000000000000000"
      ENCRYPTION_KEY: "ci_placeholder_encryption_key_0123456789abcdef"
      NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY: "public_ci_placeholder"
      IMAGEKIT_PRIVATE_KEY: "private_ci_placeholder"
      NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT: "https://ik.imagekit.io/ciplaceholder"
      META_APP_ID: "0000000000000000"
      META_APP_SECRET: "ci_placeholder_meta_secret"
    steps:
      - name: Checkout
        # Pinned to commit SHA (v4) for supply-chain safety.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`): a lockfile authored on Windows can't
        # record other-platform esbuild optional binaries (npm/cli#4828), which
        # makes `npm ci` fail on the Linux runner. `npm install` fetches the
        # correct platform binaries and is tolerant of that lockfile gap.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Migration check
        # Fails if the committed Drizzle migrations are inconsistent.
        run: npx drizzle-kit check

      - name: Provision test database schema
        # The integration database is throwaway; push the current checked schema
        # instead of replaying historical migrations that include superseded
        # branch-generated duplicates.
        run: npm run db:push -- --force

      - name: Test
        run: npm run test

      - name: Integration tests
        run: npm run test:integration

      - name: Brand-safety gate
        # Deterministic, key-free regression gate (Vigil): banned-term/PII examples
        # must stay held even under a maximally-permissive judge, so a guardrail
        # regression can't let an unsafe draft auto-publish. The live-judge
        # threshold calibration (npm run eval:brand-safety) needs an LLM key and
        # runs separately/nightly, not on every PR.
        run: npm run eval:gate

      - name: Build
        run: npm run build

      - name: Security audit (advisory)
        # Advisory only — surfaces high-severity advisories without blocking CI.
        continue-on-error: true
        run: npm audit --audit-level=high
